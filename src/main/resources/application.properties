spring.application.name=userManagement

# Browser CORS: comma-separated origin patterns (Spring 5.3+). Production: set to your SPA origins (https://…).
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# Developer default profile (permissive DB/Redis; non-Secure cookies). Production: SPRING_PROFILES_ACTIVE=prod.
spring.profiles.default=local

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JDBC URL and credentials are profile-specific (application-local.properties or application-prod.properties).
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false
spring.jpa.open-in-view=false
# Production-safe default: validate schema only (use Flyway/Liquibase for changes)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.hbm2ddl.auto=
spring.mvc.dispatch-options-request=true
#server.port=8080

# ===== LOGGING CONFIGURATION =====
logging.level.root=INFO
logging.level.com.syncnest=INFO
logging.level.com.syncnest.userservice.controller=INFO
logging.level.com.syncnest.userservice.service=INFO
logging.level.com.syncnest.userservice.serviceImpl=INFO
logging.level.com.syncnest.userservice.bootstrap=INFO
logging.level.com.syncnest.userservice.SecurityConfig=INFO
logging.level.com.syncnest.userservice.config=INFO
logging.level.com.syncnest.userservice.utils=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.web=INFO
logging.level.org.springframework.data=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Absolute cap (30d) and sliding inactivity window must align, or expiresAt = min(...) stays short.
# 2592000 s = 30 days (matches refresh-token.expiration.milliseconds).
refresh-token.expiration.milliseconds=2592000000
refresh-token.inactivity.seconds=2592000
refresh-token.max.count=3
app.init.admin.password=${APP_INIT_ADMIN_PASSWORD}
app.init.user.password=${APP_INIT_USER_PASSWORD}

# ===== SOFT-DELETE CONFIGURATION =====
# Grace period (days) during which a soft-deleted account can be restored
app.soft-delete.grace-period-days=30
# Retention period (days) after which soft-deleted records are permanently purged
app.soft-delete.retention-days=90
# Cron expression for the purge job (default: daily at 3:00 AM)
app.soft-delete.purge-cron=0 0 3 * * ?


# Base64-encoded HS256 key (>= 256 bits after decode). Set JWT_SECRET (e.g. in .env); no insecure default.
token.key.secret=${JWT_SECRET}
# Optional dedicated secret for HMAC of signup OTP / password-reset codes in Redis. If empty, JWT_SECRET is used (derive a separate APP_SHORT_CODE_HMAC_SECRET in production if you want key separation).
app.security.short-code-hmac-secret=${APP_SHORT_CODE_HMAC_SECRET:}
token.key.jwtExpiration=900000
server.servlet.context-path=/api/v1

# Redis client tuning (hosts / TLS / passwords are set per profile: application-local.properties or application-prod.properties).
spring.data.redis.timeout=5s
spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-active=32
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.repositories.enabled=false

# Browser OAuth2 (authorization code). Google Cloud Console → Credentials → your Web client →
# "Authorized redirect URIs" must match EXACTLY (scheme, host, port, path; localhost ≠ 127.0.0.1).
# Default matches server.port=8080 + context-path /api/v1. Override if you use another host/port.
# Start login: GET http://localhost:8080/api/v1/oauth2/authorization/google
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH2_REDIRECT_URI:http://localhost:8080/api/v1/login/oauth2/code/google}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# SPA URLs after Google browser login (fixed — never take redirect targets from user input).
app.oauth2.frontend-success-url=${APP_OAUTH2_SUCCESS_URL:http://localhost:5173/auth/google/callback}
app.oauth2.frontend-error-url=${APP_OAUTH2_ERROR_URL:http://localhost:5173/auth/google/error}
# One-time ticket TTL for POST /auth/oauth2/exchange (seconds, 30–600).
app.oauth2.ott-ttl-seconds=120

# SMTP: supply credentials only via environment / secret manager (never commit).
# Spring Boot auto-configures JavaMailSender from these properties (no custom @Bean).
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
# Verbose SMTP wire logging — enable only when debugging locally (e.g. MAIL_DEBUG=true).
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

