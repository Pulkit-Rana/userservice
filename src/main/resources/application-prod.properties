# Production profile. Activate with: SPRING_PROFILES_ACTIVE=prod
#
# These settings intentionally fail closed:
# - Required environment variables have no local fallback.
# - Refresh-token cookies are Secure.
# - MySQL TLS identity verification is required.
# - Redis TLS is enabled.

app.cookie.secure=true
server.forward-headers-strategy=framework

# Required for browser clients: comma-separated CORS origin patterns (e.g. https://app.example.com,https://*.example.com).
# app.cors.allowed-origin-patterns=https://your-spa.example.com

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB}?sslMode=VERIFY_IDENTITY&allowPublicKeyRetrieval=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

spring.data.redis.timeout=5s
spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-active=32
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.repositories.enabled=false

# Never enable SMTP wire debug in production (overrides any MAIL_DEBUG from the environment).
spring.mail.properties.mail.debug=false
