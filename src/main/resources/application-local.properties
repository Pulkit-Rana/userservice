# Profile: local (activated by default via spring.profiles.default=local in application.properties).
# Permissive TLS for typical Docker / dev MySQL and plaintext localhost Redis.
# Production must use SPRING_PROFILES_ACTIVE=prod — never rely on this profile in deployed environments.

app.cookie.secure=false

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:sync_nest}?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=false

# Optional: set to DEBUG for noisier auth/token/device logs while debugging (logback defaults those loggers to INFO).
# logging.level.com.syncnest.userservice.serviceImpl.AuthServiceImpl=DEBUG
# logging.level.com.syncnest.userservice.serviceImpl.OtpServiceImpl=DEBUG
